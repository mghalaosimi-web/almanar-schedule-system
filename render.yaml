services:
  - type: web
    name: manar-schedule-backend
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: node backend/src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
